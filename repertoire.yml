# Répertoire de la fanfare Les Krapos
# ------------------------------------
# Format de chaque morceau :
#   - nom: "..."             (obligatoire)
#     nom_complet: "..."     (optionnel, titre + artiste pour le partage du répertoire)
#     type: debut|teuf|connu|choree|chill|rappel|standard   (optionnel, défaut: standard)
#     tags: [debut, teuf, connu, choree, chill, rappel, nouveau, pas-debut]  (optionnel)
#     fatigant: "instrument" (optionnel, chaîne ; non vide => interdit en 2e moitié de set)
#     tricote: "instrument"  (optionnel, chaîne ; non vide => difficile au sax, interdit en 2e moitié)
#     discord: "1234567890"  (optionnel, id du salon Discord associé au morceau)
#
# Tag spécial "nouveau" : marque un morceau récemment ajouté, peu maîtrisé.
# Inclus dans les set-lists uniquement si la case « Inclure les nouveaux morceaux » est cochée.
#
# Tag "pas-debut" : le morceau ne doit pas être en première position (il faut être échauffé).
#
# INSTRUCTIONS : supprimer les champs non pertinents pour chaque morceau.
# Par défaut tous les champs sont présents pour faciliter le tri.

